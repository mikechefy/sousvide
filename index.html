<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A clean, minimal cheat sheet for sousvide cooking times and temperatures." />
  <title>Sousvide Cheat Sheet</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="container header-inner">
      <div class="brand">
        <h1>Sousvide</h1>
        <span class="subtitle">Cheat Sheet</span>
      </div>
      <input
        type="search"
        id="search"
        placeholder="Search cuts…"
        aria-label="Search cuts"
        autocomplete="off"
        spellcheck="false"
      />
    </div>
  </header>

  <main class="container" id="content">
    <noscript>
      <p class="noscript">
        This cheat sheet loads its data from <code>data.json</code>. Please enable JavaScript.
      </p>
    </noscript>
  </main>

  <footer class="container">
    <p id="disclaimer"></p>
    <p id="meta"></p>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
